<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Monitoreo Territorial</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- MapLibre GL JS -->
    <link href="https://unpkg.com/maplibre-gl@4.3.2/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/maplibre-gl@4.3.2/dist/maplibre-gl.js"></script>

    <!-- Turf.js para Buffer -->
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>

    <!-- Shapefile Export -->
    <script src="https://unpkg.com/@mapbox/shp-write@latest/shpwrite.js"></script>
    <!-- FileSaver.js para descarga de shapefiles -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

    <style>
        .sinader-popup .maplibregl-popup-content {
            background: rgba(15, 23, 42, 0.85) !important;
            backdrop-filter: blur(12px) !important;
            border: 1px solid rgba(34, 211, 238, 0.4) !important;
            border-radius: 8px !important;
            padding: 0 !important;
            box-shadow: 0 0 20px rgba(34, 211, 238, 0.15), 0 4px 12px rgba(0, 0, 0, 0.5) !important;
            font-family: 'Courier New', monospace !important;
        }
        .sinader-popup .maplibregl-popup-tip {
            border-top-color: rgba(34, 211, 238, 0.4) !important;
            border-bottom-color: rgba(34, 211, 238, 0.4) !important;
        }
        .sinader-popup .popup-content {
            padding: 12px 14px;
        }
        .sinader-popup .popup-title {
            color: #22d3ee;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-shadow: 0 0 8px rgba(34, 211, 238, 0.6);
            line-height: 1.3;
        }
        .sinader-popup .popup-subtitle {
            color: #94a3b8;
            font-size: 11px;
            margin-top: 2px;
        }
        .sinader-popup .popup-divider {
            height: 1px;
            background: linear-gradient(to right, rgba(34, 211, 238, 0.3), transparent);
            margin: 7px 0;
        }
        .sinader-popup .popup-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 8px;
            padding: 1px 0;
        }
        .sinader-popup .popup-label {
            color: #64748b;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            flex-shrink: 0;
        }
        .sinader-popup .popup-value {
            color: #e2e8f0;
            font-size: 11px;
            text-align: right;
            word-break: break-word;
        }
        .sinader-popup .popup-rol {
            color: #d946ef;
            text-shadow: 0 0 6px rgba(217, 70, 239, 0.5);
        }

        /* Charts Panel */
        #charts-btn {
            position: absolute;
            bottom: 24px;
            left: 24px;
            z-index: 10;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            letter-spacing: 1.5px;
            padding: 10px 18px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(217, 70, 239, 0.5);
            color: #d946ef;
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s ease;
            box-shadow: 0 0 12px rgba(217, 70, 239, 0.15);
        }
        #charts-btn:hover {
            background: rgba(217, 70, 239, 0.1);
            border-color: #d946ef;
            box-shadow: 0 0 20px rgba(217, 70, 239, 0.3);
        }
        #charts-btn.active {
            border-color: #22d3ee;
            color: #22d3ee;
            box-shadow: 0 0 20px rgba(34, 211, 238, 0.3);
        }

        #charts-panel {
            position: absolute;
            top: 0;
            right: 0;
            width: 340px;
            height: 100%;
            z-index: 20;
            background: rgba(15, 23, 42, 0.92);
            backdrop-filter: blur(16px);
            border-left: 1px solid rgba(34, 211, 238, 0.3);
            box-shadow: -4px 0 24px rgba(0, 0, 0, 0.6);
            transform: translateX(100%);
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
        }
        #charts-panel.open {
            transform: translateX(0);
        }

        #charts-panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 18px 12px;
            border-bottom: 1px solid rgba(34, 211, 238, 0.15);
            flex-shrink: 0;
        }
        #charts-panel-header h2 {
            font-family: 'Courier New', monospace;
            font-size: 14px;
            font-weight: 700;
            color: #22d3ee;
            letter-spacing: 2px;
            text-shadow: 0 0 8px rgba(34, 211, 238, 0.4);
            text-transform: uppercase;
        }
        #charts-close {
            background: none;
            border: 1px solid rgba(100, 116, 139, 0.4);
            color: #94a3b8;
            width: 28px;
            height: 28px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        #charts-close:hover {
            border-color: #d946ef;
            color: #d946ef;
        }

        #charts-container {
            flex: 1;
            overflow-y: auto;
            padding: 12px 16px 24px;
            scrollbar-width: thin;
            scrollbar-color: rgba(34, 211, 238, 0.2) transparent;
        }
        #charts-container::-webkit-scrollbar {
            width: 4px;
        }
        #charts-container::-webkit-scrollbar-track {
            background: transparent;
        }
        #charts-container::-webkit-scrollbar-thumb {
            background: rgba(34, 211, 238, 0.3);
            border-radius: 2px;
        }

        .chart-card {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(34, 211, 238, 0.12);
            border-radius: 8px;
            padding: 14px 14px 8px;
            margin-bottom: 14px;
        }
        .chart-card-title {
            font-family: 'Courier New', monospace;
            font-size: 10px;
            color: #d946ef;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            margin-bottom: 8px;
        }
        .chart-card canvas {
            width: 100% !important;
        }

        /* Chart.js custom theme overrides */
        .chart-card .chartjs-tooltip {
            background: rgba(15, 23, 42, 0.95) !important;
            backdrop-filter: blur(8px) !important;
            border: 1px solid rgba(34, 211, 238, 0.3) !important;
            border-radius: 4px !important;
            padding: 6px 10px !important;
            font-family: 'Courier New', monospace !important;
            font-size: 11px !important;
            color: #e2e8f0 !important;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-300 font-sans overflow-hidden">
    
    <!-- Layout General: Flexbox, pantalla completa, sin scroll -->
    <div class="flex h-screen w-full">
        
        <!-- Panel Lateral (Izquierda): 25% de ancho, Glassmorphism, Borde Neón -->
        <aside class="w-1/4 flex flex-col p-6 backdrop-blur-md bg-white/5 border-r border-cyan-500/50 shadow-[4px_0_15px_#06b6d4] z-10">
            
            <!-- Título Principal -->
            <h1 class="font-mono text-2xl font-bold text-cyan-400 mb-8 tracking-widest">
                SISTEMA DE MONITOREO TERRITORIAL
            </h1>
            
            <!-- Sección: Control de Capas -->
            <h2 class="font-mono text-lg text-fuchsia-400 mb-3 tracking-wider uppercase">
                Control de Capas
            </h2>

            <div id="filter-count" class="font-mono text-xs text-slate-500 text-center py-1 mb-2 border-b border-slate-800">
                Cargando datos...
            </div>

            <div class="flex-1 overflow-y-auto space-y-3 pr-1">

                <!-- Región -->
                <div>
                    <label class="font-mono text-xs text-cyan-400 uppercase tracking-wider block mb-1">Región</label>
                    <div id="region-filters" class="max-h-24 overflow-y-auto bg-slate-900/60 rounded border border-slate-800 p-1.5 space-y-0.5">
                    </div>
                </div>

                <!-- Proceso -->
                <div>
                    <label class="font-mono text-xs text-cyan-400 uppercase tracking-wider block mb-1">Proceso</label>
                    <div id="proceso-filters" class="flex gap-2">
                        <button data-value="Municipal" class="flex-1 font-mono text-xs py-1.5 border rounded transition-all duration-200 border-slate-600 text-slate-400 hover:border-cyan-500/50 cursor-pointer">MUNICIPAL</button>
                        <button data-value="de Oficio" class="flex-1 font-mono text-xs py-1.5 border rounded transition-all duration-200 border-slate-600 text-slate-400 hover:border-cyan-500/50 cursor-pointer">DE OFICIO</button>
                    </div>
                </div>

                <!-- Comuna -->
                <div>
                    <label class="font-mono text-xs text-cyan-400 uppercase tracking-wider block mb-1">Comuna</label>
                    <div id="comuna-filters" class="max-h-24 overflow-y-auto bg-slate-900/60 rounded border border-slate-800 p-1.5 space-y-0.5">
                    </div>
                </div>

                <!-- Hectáreas -->
                <div>
                    <label class="font-mono text-xs text-cyan-400 uppercase tracking-wider block mb-1">Hectáreas (ha)</label>
                    <div class="flex gap-2">
                        <input id="ha-min" type="number" placeholder="Mín" class="w-1/2 bg-slate-900/80 border border-slate-700 rounded text-slate-200 font-mono text-xs py-1.5 px-2 focus:outline-none focus:border-cyan-500 transition-all">
                        <input id="ha-max" type="number" placeholder="Máx" class="w-1/2 bg-slate-900/80 border border-slate-700 rounded text-slate-200 font-mono text-xs py-1.5 px-2 focus:outline-none focus:border-cyan-500 transition-all">
                    </div>
                </div>

                <!-- Nombre -->
                <div>
                    <label class="font-mono text-xs text-cyan-400 uppercase tracking-wider block mb-1">Nombre del Humedal</label>
                    <div id="nombre-filters" class="max-h-24 overflow-y-auto bg-slate-900/60 rounded border border-slate-800 p-1.5 space-y-0.5">
                    </div>
                </div>

                <button id="clear-filters" class="w-full font-mono text-xs text-fuchsia-400 border border-fuchsia-500/30 bg-transparent py-1.5 tracking-wider uppercase rounded hover:bg-fuchsia-400/10 hover:border-fuchsia-500/60 transition-all duration-300 cursor-pointer">
                    LIMPIAR FILTROS
                </button>

                <div class="border-t border-cyan-500/20 pt-3 mt-3">
                    <details id="legend-details" open>
                        <summary class="font-mono text-xs text-fuchsia-400 uppercase tracking-wider cursor-pointer select-none hover:text-fuchsia-300 transition-colors">
                            Leyenda SINADER
                        </summary>
                        <div id="legend" class="mt-2 space-y-1 max-h-48 overflow-y-auto bg-slate-900/60 rounded border border-slate-800 p-2">
                            <div class="font-mono text-xs text-slate-500 text-center">Cargando...</div>
                        </div>
                    </details>
                </div>
            </div>

            <!-- Sección Buffer -->
            <div class="border-t border-cyan-500/20 pt-4 mb-4">
                <h3 class="font-mono text-sm text-fuchsia-400 mb-3 tracking-wider uppercase">Herramienta Buffer</h3>
                <div class="space-y-3">
                    <div>
                        <label class="font-mono text-xs text-slate-400 mb-1 block">Distancia (metros):</label>
                        <input type="number" id="buffer-distance" value="100" min="1" class="w-full bg-slate-950/80 border border-cyan-500/50 text-cyan-200 font-mono py-1.5 px-2 focus:outline-none focus:border-cyan-400 focus:shadow-[0_0_10px_#22d3ee]">
                    </div>
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" id="buffer-dissolve" checked class="w-4 h-4 accent-cyan-500 cursor-pointer">
                        <span class="font-mono text-xs text-slate-300">Disolver (unir polígonos)</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" id="buffer-use-filter" checked class="w-4 h-4 accent-cyan-500 cursor-pointer">
                        <span class="font-mono text-xs text-slate-300">Usar filtro actual</span>
                    </label>
                    <button id="btn-generate-buffer" class="w-full font-mono text-xs text-cyan-400 border border-cyan-500/50 bg-transparent py-2 hover:bg-cyan-500/10 transition-colors cursor-pointer active:scale-95">
                        GENERAR BUFFER
                    </button>
                    <div id="buffer-download-section" class="hidden space-y-2">
                        <button id="btn-download-geojson" class="w-full font-mono text-xs text-emerald-400 border border-emerald-500/50 bg-transparent py-1.5 hover:bg-emerald-500/10 transition-colors cursor-pointer active:scale-95">
                            DESCARGAR GEOJSON
                        </button>
                        <button id="btn-download-shapefile" class="w-full font-mono text-xs text-amber-400 border border-amber-500/50 bg-transparent py-1.5 hover:bg-amber-500/10 transition-colors cursor-pointer active:scale-95">
                            DESCARGAR SHAPEFILE
                        </button>
                    </div>
                </div>
            </div>

            <!-- Botón de Acción Cyberpunk -->
            <button id="init-map-btn" class="mt-auto font-mono text-cyan-400 border-2 border-cyan-400 bg-transparent py-3 px-4 font-bold tracking-widest uppercase transition-all duration-300 hover:bg-cyan-400/10 hover:shadow-[0_0_20px_#22d3ee] active:scale-95 cursor-pointer">
                INICIALIZAR MAPLIBRE
            </button>
            
        </aside>

        <!-- Contenedor Principal (Derecha): 75% de ancho -->
        <main class="w-3/4 relative bg-slate-900/50">
            <!-- Lienzo del mapa -->
            <div id="map" class="h-full w-full"></div>

            <!-- Toggle Satelite -->
            <button id="satellite-btn" style="position: absolute; top: 20px; left: 20px; z-index: 10; background: rgba(15, 23, 42, 0.85); border: 1px solid rgba(34, 211, 238, 0.4); color: #22d3ee; padding: 8px 16px; font-family: 'Courier New', monospace; font-weight: bold; border-radius: 6px; cursor: pointer; text-transform: uppercase; transition: all 0.3s ease;">
                🌍 Mapa Satelital
            </button>

            <!-- Botón flotante Gráficos -->
            <button id="charts-btn">📊 Gráficos</button>

            <!-- Panel lateral de Gráficos -->
            <aside id="charts-panel">
                <div id="charts-panel-header">
                    <h2>📊 Estadísticas</h2>
                    <button id="charts-close">✕</button>
                </div>
                <div id="charts-container">
                    <div class="chart-card">
                        <div class="chart-card-title">Humedales — Hectáreas por Región</div>
                        <canvas id="chart-humedales-ha"></canvas>
                    </div>
                    <div class="chart-card">
                        <div class="chart-card-title">Humedales — Proceso</div>
                        <canvas id="chart-humedales-proceso"></canvas>
                    </div>
                    <div class="chart-card">
                        <div class="chart-card-title">SINADER — Top 10 Rubros</div>
                        <canvas id="chart-sinader-rubros"></canvas>
                    </div>
                    <div class="chart-card">
                        <div class="chart-card-title">SINADER — Establecimientos por Región</div>
                        <canvas id="chart-sinader-regiones"></canvas>
                    </div>
                </div>
            </aside>
        </main>
        
    </div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        let map = null;
        let geojsonData = null;
        let sinaderData = null;
        let bufferResult = null;
        let bufferLayerAdded = false;
        const initBtn = document.getElementById('init-map-btn');
        const filterCount = document.getElementById('filter-count');

        initBtn.addEventListener('click', () => {
            if (map) return;

            initBtn.textContent = 'CARGANDO...';
            initBtn.classList.add('opacity-50', 'cursor-wait');

            map = new maplibregl.Map({
                container: 'map',
                style: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
                center: [-70.6693, -33.4489],
                zoom: 8
            });

            map.on('load', () => {
                // Add satellite raster
                map.addSource('satellite', {
                    type: 'raster',
                    tiles: ['https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'],
                    tileSize: 256
                });
                map.addLayer({
                    id: 'satellite-layer',
                    type: 'raster',
                    source: 'satellite',
                    layout: { visibility: 'none' }
                });

                // Toggle satellite logic
                const satBtn = document.getElementById('satellite-btn');
                satBtn.addEventListener('click', () => {
                    const isSat = map.getLayoutProperty('satellite-layer', 'visibility') === 'visible';
                    map.setLayoutProperty('satellite-layer', 'visibility', isSat ? 'none' : 'visible');
                    satBtn.innerHTML = isSat ? '🌍 Mapa Satelital' : '🌑 Mapa Oscuro';
                    if(!isSat) {
                        satBtn.style.background = 'rgba(232, 121, 249, 0.2)';
                        satBtn.style.borderColor = '#e879f9';
                        satBtn.style.color = '#e879f9';
                    } else {
                        satBtn.style.background = 'rgba(15, 23, 42, 0.85)';
                        satBtn.style.borderColor = 'rgba(34, 211, 238, 0.4)';
                        satBtn.style.color = '#22d3ee';
                    }
                });

                fetch('./Humedales_Urbanos.geojson')
                    .then(r => r.json())
                    .then(data => {
                        geojsonData = data;

                        map.addSource('humedales', { type: 'geojson', data });
                        map.addLayer({
                            id: 'humedales-layer',
                            type: 'fill',
                            source: 'humedales',
                            paint: {
                                'fill-color': '#06b6d4',
                                'fill-opacity': 0.6,
                                'fill-outline-color': '#22d3ee'
                            }
                        });

                        buildRegionFilters(data);
                        updateDependentFilters();
                        enableFilters();
                        applyFilters();

                        map.on('click', 'humedales-layer', (e) => {
                            const p = e.features[0].properties;
                            new maplibregl.Popup({ className: 'sinader-popup', maxWidth: '320px' })
                                .setLngLat(e.lngLat)
                                .setHTML(`<div class="popup-content">
                                    <div class="popup-title">${p.nombre_humedal || 'Sin nombre'}</div>
                                    <div class="popup-subtitle">Humedal Urbano</div>
                                    <div class="popup-divider"></div>
                                    <div class="popup-row"><span class="popup-label">Comuna</span><span class="popup-value">${p.comuna}</span></div>
                                    <div class="popup-row"><span class="popup-label">Región</span><span class="popup-value">${p.region}</span></div>
                                    <div class="popup-row"><span class="popup-label">Hectáreas</span><span class="popup-value">${p.ha}</span></div>
                                    <div class="popup-row"><span class="popup-label">Proceso</span><span class="popup-value">${p.proceso_humedal_urbano}</span></div>
                                    <div class="popup-row"><span class="popup-label">Código</span><span class="popup-value">${p.cod_humedal}</span></div>
                                </div>`)
                                .addTo(map);
                        });
                        map.on('mouseenter', 'humedales-layer', () => { map.getCanvas().style.cursor = 'pointer'; });
                        map.on('mouseleave', 'humedales-layer', () => { map.getCanvas().style.cursor = ''; });

                        // Buffer Event Listeners
                        document.getElementById('btn-generate-buffer').addEventListener('click', generateBuffer);
                        document.getElementById('btn-download-geojson').addEventListener('click', downloadGeoJSON);
                        document.getElementById('btn-download-shapefile').addEventListener('click', downloadShapefile);

                        // Cargar capa SINADER con clustering
                        fetch('./sinader_puntos.geojson')
                            .then(r => r.json())
                            .then(data => {
                                sinaderData = data;
                                const rubroColors = {
                                    "Otras actividades": "#ff0055",
                                    "Comercio minorista": "#ff6600",
                                    "Otras industrias manufactureras": "#ffb000",
                                    "Pesca y acuicultura": "#88ff00",
                                    "Construcci\u00f3n": "#00ff88",
                                    "Producci\u00f3n agropecuaria": "#00f0ff",
                                    "Comercio mayorista": "#0066ff",
                                    "Ventas y mantenci\u00f3n de veh\u00edculos automotores": "#aa00ff",
                                    "Industria qu\u00edmica, de pl\u00e1stico y caucho": "#ff00aa",
                                    "Captaci\u00f3n, tratamiento y distribuci\u00f3n de agua": "#ffaa00",
                                    "Otras centrales de generaci\u00f3n el\u00e9ctrica": "#00ffcc",
                                    "Miner\u00eda": "#ff6b6b",
                                    "Industria de la madera y silvicultura": "#00ccff",
                                    "Industria del papel y celulosa": "#ff00ff",
                                    "Gestores de residuos": "#00ffaa",
                                    "Plantas de tratamiento de aguas servidas": "#ffcc00",
                                    "Termoel\u00e9ctricas": "#6699ff",
                                    "Producci\u00f3n de cemento, cal y yeso": "#ff66cc",
                                    "Refiner\u00eda de petr\u00f3leo": "#66ff99"
                                };

                                map.addSource('sinader', {
                                    type: 'geojson',
                                    data: sinaderData,
                                    cluster: true,
                                    clusterMaxZoom: 14,
                                    clusterRadius: 50
                                });

                                map.addLayer({
                                    id: 'sinader-cluster',
                                    type: 'circle',
                                    source: 'sinader',
                                    filter: ['has', 'point_count'],
                                    paint: {
                                        'circle-color': '#00f0ff',
                                        'circle-radius': [
                                            'step',
                                            ['get', 'point_count'],
                                            18,
                                            10,
                                            24,
                                            50,
                                            32,
                                            200,
                                            40
                                        ],
                                        'circle-opacity': [
                                            'step',
                                            ['get', 'point_count'],
                                            0.35,
                                            10,
                                            0.55,
                                            50,
                                            0.75,
                                            200,
                                            0.95
                                        ],
                                        'circle-stroke-width': 2,
                                        'circle-stroke-color': [
                                            'step',
                                            ['get', 'point_count'],
                                            'rgba(0,240,255,0.3)',
                                            10,
                                            'rgba(0,240,255,0.4)',
                                            50,
                                            'rgba(0,240,255,0.5)',
                                            200,
                                            'rgba(0,240,255,0.7)'
                                        ]
                                    }
                                });

                                map.addLayer({
                                    id: 'sinader-cluster-count',
                                    type: 'symbol',
                                    source: 'sinader',
                                    filter: ['has', 'point_count'],
                                    layout: {
                                        'text-field': ['get', 'point_count_abbreviated'],
                                        'text-font': ['Open Sans Bold', 'Arial Unicode MS Bold'],
                                        'text-size': 12
                                    },
                                    paint: {
                                        'text-color': '#ffffff'
                                    }
                                });

                                const matchExpr = ['match', ['get', 'rubro']];
                                Object.entries(rubroColors).forEach(([k, v]) => {
                                    matchExpr.push(k, v);
                                });
                                matchExpr.push('rgba(255,255,255,0.4)');

                                map.addLayer({
                                    id: 'sinader-layer',
                                    type: 'circle',
                                    source: 'sinader',
                                    filter: ['!', ['has', 'point_count']],
                                    paint: {
                                        'circle-color': matchExpr,

        function buildRegionFilters(data) {
            const regiones = [...new Set(data.features.map(f => f.properties.region))].sort();

                `<label class="flex items-center gap-1.5 cursor-pointer hover:bg-slate-800/50 rounded px-1 py-0.5 transition-colors">

                </label>`

        function updateDependentFilters() {
            if (!geojsonData) return;
            const selectedRegions = [...document.querySelectorAll('#region-filters input:checked')].map(cb => cb.value);
            
            let regionFeatures = geojsonData.features;
            if (selectedRegions.length > 0) {
                regionFeatures = regionFeatures.filter(f => selectedRegions.includes(f.properties.region));
            }

            const selectedComunas = [...document.querySelectorAll('#comuna-filters input:checked')].map(cb => cb.value);
            
            const comunas = [...new Set(regionFeatures.map(f => f.properties.comuna).filter(Boolean))].sort();
            document.getElementById('comuna-filters').innerHTML = comunas.map(c => {
                const isChecked = selectedComunas.includes(c) ? 'checked' : '';
                return `<label class="flex items-center gap-1.5 cursor-pointer hover:bg-slate-800/50 rounded px-1 py-0.5 transition-colors">
                    <input type="checkbox" value="${c.replace(/"/g, '&quot;')}" class="accent-cyan-500 cursor-pointer" ${isChecked}>
                    <span class="font-mono text-xs text-slate-300">${c}</span>
                </label>`;
            }).join('');

            const activeComunas = [...document.querySelectorAll('#comuna-filters input:checked')].map(cb => cb.value);

            let comunaFeatures = regionFeatures;
            if (activeComunas.length > 0) {
                comunaFeatures = comunaFeatures.filter(f => activeComunas.includes(f.properties.comuna));
            }

            const selectedNombres = [...document.querySelectorAll('#nombre-filters input:checked')].map(cb => cb.value);

            const nombres = [...new Set(comunaFeatures.map(f => f.properties.nombre_humedal).filter(Boolean))].sort();
            document.getElementById('nombre-filters').innerHTML = nombres.map(n => {
                const isChecked = selectedNombres.includes(n) ? 'checked' : '';
                return `<label class="flex items-center gap-1.5 cursor-pointer hover:bg-slate-800/50 rounded px-1 py-0.5 transition-colors">
                    <input type="checkbox" value="${n.replace(/"/g, '&quot;')}" class="accent-cyan-500 cursor-pointer" ${isChecked}>
                    <span class="font-mono text-xs text-slate-300 truncate" title="${n.replace(/"/g, '&quot;')}">${n}</span>
                </label>`;
            }).join('');

            document.querySelectorAll('#comuna-filters input').forEach(el => el.addEventListener('change', () => { 
                updateDependentFilters(); 
                applyFilters(); 
            }));
            document.querySelectorAll('#nombre-filters input').forEach(el => el.addEventListener('change', applyFilters));
        }

        function enableFilters() {
            document.querySelectorAll('#region-filters input').forEach(el => el.addEventListener('change', () => {
                updateDependentFilters();
                applyFilters();
            }));
            document.querySelectorAll('#proceso-filters button').forEach(btn => {
                btn.addEventListener('click', () => {

        function getFilteredFeatures() {
            if (!geojsonData) return [];
            const selectedRegions = [...document.querySelectorAll('#region-filters input:checked')].map(cb => cb.value);
            const selectedComunas = [...document.querySelectorAll('#comuna-filters input:checked')].map(cb => cb.value);
            const selectedNombres = [...document.querySelectorAll('#nombre-filters input:checked')].map(cb => cb.value);
            const selectedProcesos = [...document.querySelectorAll('#proceso-filters .active')].map(btn => btn.dataset.value);
            const haMin = parseFloat(document.getElementById('ha-min').value);
            const haMax = parseFloat(document.getElementById('ha-max').value);

            return geojsonData.features.filter(f => {
                const p = f.properties;
                if (selectedRegions.length && !selectedRegions.includes(p.region)) return false;
                if (selectedProcesos.length && !selectedProcesos.includes(p.proceso_humedal_urbano)) return false;
                if (selectedComunas.length && !selectedComunas.includes(p.comuna)) return false;
                if (selectedNombres.length && !selectedNombres.includes(p.nombre_humedal)) return false;
                if (!isNaN(haMin) && p.ha < haMin) return false;
                if (!isNaN(haMax) && p.ha > haMax) return false;
                return true;
            });
        }

        function computeBounds(features) {
            let minLon = Infinity, minLat = Infinity, maxLon = -Infinity, maxLat = -Infinity;
            features.forEach(f => {
                f.geometry.coordinates.forEach(poly => {
                    poly.forEach(ring => {
                        ring.forEach(([lon, lat]) => {
                            if (lon < minLon) minLon = lon;
                            if (lat < minLat) minLat = lat;
                            if (lon > maxLon) maxLon = lon;
                            if (lat > maxLat) maxLat = lat;
                        });
                    });
                });
            });
            return [[minLon, minLat], [maxLon, maxLat]];
        }

        function applyFilters() {
            if (!map || !geojsonData) return;
            const matched = getFilteredFeatures();
            const matchedIds = matched.map(f => f.properties.objectid);

            if (matched.length === 0) {
                map.setFilter('humedales-layer', ['==', ['get', 'objectid'], -1]);
                map.setPaintProperty('humedales-layer', 'fill-color', '#06b6d4');
                map.setPaintProperty('humedales-layer', 'fill-opacity', 0.6);
                map.setPaintProperty('humedales-layer', 'fill-outline-color', '#22d3ee');
            } else if (matched.length === geojsonData.features.length) {
                map.setFilter('humedales-layer', null);
                map.setPaintProperty('humedales-layer', 'fill-color', '#06b6d4');
                map.setPaintProperty('humedales-layer', 'fill-opacity', 0.6);
                map.setPaintProperty('humedales-layer', 'fill-outline-color', '#22d3ee');
            } else {
                map.setFilter('humedales-layer', ['in', ['get', 'objectid'], ['literal', matchedIds]]);
                map.setPaintProperty('humedales-layer', 'fill-color', '#fbbf24');
                map.setPaintProperty('humedales-layer', 'fill-opacity', 0.5);
                map.setPaintProperty('humedales-layer', 'fill-outline-color', '#f59e0b');
                const bounds = computeBounds(matched);
                map.fitBounds(bounds, { padding: 80, maxZoom: 15, duration: 1000 });
            }
            filterCount.textContent = `Mostrando ${matched.length} de ${geojsonData.features.length} humedales`;
        }

        // Buffer Functions
        function removeBufferLayer() {
            if (bufferLayerAdded) {
                try {
                    if (map && map.getLayer('buffer-layer-fill')) map.removeLayer('buffer-layer-fill');
                    if (map && map.getLayer('buffer-layer-outline')) map.removeLayer('buffer-layer-outline');
                    if (map && map.getSource('buffer-source')) map.removeSource('buffer-source');
                } catch (e) {}
                bufferLayerAdded = false;
            }
        }

        function dissolveTurf(fc) {
            if (!fc || !fc.features || fc.features.length <= 1) return fc;
            let result = fc.features[0];
            for (let i = 1; i < fc.features.length; i++) {
                try { result = turf.union(result, fc.features[i]); } catch (e) {}
            }
            return turf.featureCollection([result]);
        }

        function generateBuffer() {
            if (!map || !geojsonData) { alert('Primero inicialice el mapa.'); return; }
            const distance = parseFloat(document.getElementById('buffer-distance').value);
            const dissolve = document.getElementById('buffer-dissolve').checked;
            const useFilter = document.getElementById('buffer-use-filter').checked;
            if (isNaN(distance) || distance <= 0) { alert('Ingrese una distancia v\u00e1lida en metros.'); return; }
            let features;
            if (useFilter) {
                features = getFilteredFeatures();
                if (features.length === 0) { alert('No hay features que coincidan con el filtro actual.'); return; }
            } else {
                features = geojsonData.features;
            }
            const fc = turf.featureCollection(features);
            let buffered;
            try {
                buffered = turf.buffer(fc, distance, { units: 'meters' });
            } catch (e) { alert('Error generando buffer: ' + e.message); return; }
            if (!buffered || !buffered.features || buffered.features.length === 0) {
                alert('No se pudo generar el buffer.'); return;
            }
            if (dissolve && buffered.features.length > 1) {
                buffered = dissolveTurf(buffered);
            }
            bufferResult = buffered;
            removeBufferLayer();
            try {
                map.addSource('buffer-source', { type: 'geojson', data: buffered });
                map.addLayer({
                    id: 'buffer-layer-fill',
                    type: 'fill',
                    source: 'buffer-source',
                    paint: { 'fill-color': '#f59e0b', 'fill-opacity': 0.25, 'fill-outline-color': '#f59e0b' }
                });
                map.addLayer({
                    id: 'buffer-layer-outline',
                    type: 'line',
                    source: 'buffer-source',
                    paint: { 'line-color': '#f59e0b', 'line-width': 2, 'line-opacity': 0.8, 'line-dasharray': [4, 2] }
                });
                bufferLayerAdded = true;
            } catch (e) {
                alert('Error al agregar capa buffer: ' + e.message); return;
            }
            document.getElementById('buffer-download-section').classList.remove('hidden');
            const bbox = turf.bbox(buffered);
            map.fitBounds(bbox, { padding: 50, duration: 1000 });
        }

        function downloadGeoJSON() {
            if (!bufferResult) return;
            const blob = new Blob([JSON.stringify(bufferResult, null, 2)], { type: 'application/geo+json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'buffer_resultado.geojson';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function downloadShapefile() {
            if (!bufferResult) return;
            if (typeof shpwrite === 'undefined' || typeof saveAs === 'undefined') {
                alert('Las librer\u00edas Shapefile no est\u00e1n disponibles. Use la descarga GeoJSON.');
                return;
            }
            try {
                shpwrite.zip(bufferResult, { outputType: 'blob' }).then(function (blob) {
                    saveAs(blob, 'buffer_resultado.zip');
                }).catch(function (err) {
                    alert('Error generando Shapefile: ' + err.message);
                });
            } catch (e) {
                alert('Error descargando Shapefile: ' + e.message);
            }
        }

            const regionCount = {};
            sinaderData.features.forEach(f => {
                const r = f.properties.region;
                regionCount[r] = (regionCount[r] || 0) + 1;
            });
            const regionSorted = Object.entries(regionCount).sort((a, b) => b[1] - a[1]);
            const regionLabels = regionSorted.map(e => {
                let l = e[0].replace('Metropolitana de Santiago', 'RM').replace("Libertador General Bernardo O'Higgins", "O'Higgins").replace('Magallanes y de la Antartica Chilena', 'Magallanes').replace("Aysen del General Carlos Ibanez del Campo", 'Aysen');
                if (l.length > 16) l = l.substring(0, 14) + '...';
                return l;
            });
            const regionValues = regionSorted.map(e => e[1]);
            const regionColors = getChartColors(regionSorted.length);

            chartInstances.sinaderRegiones = new Chart(document.getElementById('chart-sinader-regiones'), {
                type: 'bar',
                data: {
                    labels: regionLabels,
                    datasets: [{
                        label: 'Establecimientos',
                        data: regionValues,
                        backgroundColor: regionColors.map(c => c + '80'),
                        borderColor: regionColors,
                        borderWidth: 1,
                        borderRadius: 2
                    }]
                },
                options: {
                    ...buildChartTheme({ legend: false }),
                    scales: {
                        x: {
                            grid: { color: 'rgba(148, 163, 184, 0.06)', drawBorder: false },
                            ticks: { color: '#64748b', font: { family: "'Courier New', monospace", size: 7 }, maxRotation: 45 }
                        },
                        y: {
                            grid: { color: 'rgba(148, 163, 184, 0.06)', drawBorder: false },
                            ticks: { color: '#64748b', font: { family: "'Courier New', monospace", size: 8 } }
                        }
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: 'rgba(15, 23, 42, 0.95)',
                            titleColor: '#22d3ee',
                            bodyColor: '#e2e8f0',
                            borderColor: 'rgba(34, 211, 238, 0.3)',
                            borderWidth: 1,
                            padding: 8,
                            titleFont: { family: "'Courier New', monospace", size: 11 },
                            bodyFont: { family: "'Courier New', monospace", size: 10 },
                            cornerRadius: 4
                        }
                    }
                }
            });
        }
    });
</script>
